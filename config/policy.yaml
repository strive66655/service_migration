# 候选范围与迁移控制
d_max: 32.0
migrate_threshold: 0.03
cooldown_steps: 2
max_candidates: 4

# 多目标权重
lambda_delay: 0.24489795918367346
lambda_migration: 0.1836734693877551
lambda_resource: 0.3673469387755102
lambda_balance: 0.20408163265306123

# transmission_delay 系数
queue_penalty_coeff: 24.0
sensitivity_coeff: 0.25

# migration_cost 系数
migration_state_coeff: 0.15
migration_hops_coeff: 8.0
migration_norm_factor: 20.0

# 资源紧张上限
resource_tension_max: 4.0

# allocation failure penalty
allocation_failure_penalty: 120.0

llm:
  provider: qwen
  model: qwen-max
  update_interval: 5
  temperature: 0.1
