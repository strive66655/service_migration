# 候选范围与迁移控制
d_max: 32.0
migrate_threshold: 0.08
cooldown_steps: 4
max_candidates: 4

# 多目标权重
lambda_delay: 0.34
lambda_migration: 0.24
lambda_resource: 0.24
lambda_balance: 0.18

# transmission_delay 系数
queue_penalty_coeff: 16.0
sensitivity_coeff: 0.25

# migration_cost 系数
migration_state_coeff: 0.08
migration_hops_coeff: 5.0
migration_norm_factor: 25.0

# 资源紧张上限
resource_tension_max: 4.0

# allocation failure penalty
allocation_failure_penalty: 80.0
